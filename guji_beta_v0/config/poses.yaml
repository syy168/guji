# 双臂关节角度配置
# 所有角度单位：度（°）
# 用途：替换 dual_arm_pick_place.py 中的硬编码点位
#
# 使用方法：
#   1. 通过示教记录各状态的实际关节角度
#   2. 将示教值填入对应状态
#   3. 重启程序或重新加载 YAML 使配置生效
#
# 注意事项：
#   - 每个状态的 6 个关节角度必须齐全，顺序对应 J1~J6
#   - 角度范围建议 ±180°，超出范围时需确认机械臂型号限制
#   - 相邻两个状态之间的角度差越大，MoveJ 弧线运动幅度越大

poses:

  # =========================================================
  # 左臂关节角度配置
  # =========================================================
  left:

    # 初始位置：双臂上举，相机朝向正前方
    # 用途：程序启动后和一轮结束后回到此位置
    initial: [0, -30, 50, 0, 80, 0]

    # 识别位置：相机垂直向下（用于观察工作台/货架）
    # 用途：开始取料前的视觉定位
    recognize: [30, -20, 40, 0, 90, 0]

    # 取料准备位：右臂伸入工件前方，左臂到工件侧面
    # 用途：预抓取对齐前的准备姿态
    pick_prep: [20, -40, 30, 0, 100, 0]

    # 托住位：左臂到达工件侧面，准备托住
    # 用途：取料 Step 1
    pick_left_support: [10, -50, 20, 0, 110, 0]

    # 抬起托住位：左臂弧线抬起托住工件
    # 用途：取料 Step 3
    pick_left_lift: [5, -60, 10, 0, 120, 0]

    # 前顶位：左臂将工件推向右臂
    # 用途：取料 Step 8
    pick_left_push: [5, -60, 10, 0, 120, 0]

    # 安全位：左臂回缩，避开右臂运动路径
    # 用途：取料 Step 11
    pick_left_safe: [0, -30, 50, 0, 80, 0]

    # 放料上方位：双臂保持在放料区上方
    # 用途：放料前准备
    place_above: [0, -30, 50, 0, 80, 0]

    # 放料退出位：右臂从放置点退出
    # 用途：放料 Step 4
    place_exit: [0, -30, 50, 0, 80, 0]

    # 放料安全位：放料完成后双臂回到安全姿态
    # 用途：放料 Step 8
    place_safe: [0, -30, 50, 0, 80, 0]

  # =========================================================
  # 右臂关节角度配置
  # =========================================================
  right:

    # 初始位置：双臂上举
    # 用途：程序启动后和一轮结束后回到此位置
    initial: [0, -30, 50, 0, 80, 0]

    # 识别位置：相机垂直向下
    # 用途：开始取料前的视觉定位
    recognize: [-30, -20, 40, 0, 90, 0]

    # 取料准备位：右臂伸入工件前方
    # 用途：预抓取对齐前的准备姿态
    pick_prep: [-20, -40, 30, 0, 100, 0]

    # 插入位：右臂伸入工件下方
    # 用途：取料 Step 4
    pick_insert: [-10, -50, 5, 0, 130, 0]

    # 夹取垂直位：右臂夹爪回到垂直姿态
    # 用途：取料 Step 6
    pick_grasp_vertical: [-5, -55, 0, 0, 135, 0]

    # 上移位：右臂带着工件上移
    # 用途：取料 Step 10
    pick_lift: [-5, -55, -10, 0, 135, 0]

    # 安全位：右臂夹取物料后，左臂已回缩
    # 用途：取料 Step 11 后右臂保持
    pick_safe: [-5, -55, -10, 0, 135, 0]

    # 放料上方位：右臂携带物料移动到放料区上方
    # 用途：放料 Step 1
    place_above: [0, -40, -20, 0, 130, 0]

    # 放料放置位：右臂下移到放置位置（力位混合搜索面）
    # 用途：放料 Step 2
    place_drop: [0, -50, -40, 0, 120, 0]

    # 放料退出位：右臂从放置点退出
    # 用途：放料 Step 4
    place_exit: [0, -40, -20, 0, 130, 0]

    # 放料安全位：放料完成后双臂回到安全姿态
    # 用途：放料 Step 8
    place_safe: [0, -30, 50, 0, 80, 0]
