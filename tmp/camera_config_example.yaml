# 相机参数配置（完整示例 - 包含臂基座固定参数）
#
# 本文件包含相机硬件信息和手眼标定结果。
# 手眼标定数据由视觉标定工具测定后填入，
# 臂基座参数从 URDF (joint.urdf.xacro) 中的固定关节提取。

camera:

  # =========================================================
  # 相机硬件信息
  # =========================================================

  model: "D435"
  serial_number: "401522071650"
  topic_prefix: "/camera_right"

  intrinsic:
    width: 640
    height: 480
    fps: 30

  # =========================================================
  # 手眼标定结果（仅右臂有相机）
  # =========================================================

  hand_eye_right:
    translation:
      x: 0.0850      # 相机原点相对于法兰的 X 偏移（米）
      y: -0.0400     # 相机原点相对于法兰的 Y 偏移（米）
      z: 0.0100      # 相机原点相对于法兰的 Z 偏移（米）
    quaternion:
      x: 0.0         # 四元数 X 分量
      y: 0.0         # 四元数 Y 分量
      z: 0.0         # 四元数 Z 分量
      w: 1.0         # 四元数 W 分量（表示无旋转）

  # =========================================================
  # 臂基座固定参数（从 URDF 中的固定关节提取）
  # =========================================================
  # 这些参数定义了机械臂末端执行器相对于基座的固定位置关系
  # 无需运行时 TF 话题支持，使用硬编码参数
  # 对应 URDF 中的固定关节定义：
  #   关节名: r_base_joint1
  #   父链接: platform_base_link
  #   子链接: r_base_link1

  arm_base_offset_right:
    position:
      x: -0.1       # 末端执行器 X 坐标相对于基座（米）
      y: -0.1103    # 末端执行器 Y 坐标相对于基座（米）
      z: 0.031645   # 末端执行器 Z 坐标相对于基座（米）
    rotation_rpy:
      r: 0.0        # 滚动角 Roll（弧度）
      p: -0.7854    # 俯仰角 Pitch（弧度，约 -45° = -π/4）
      y: 0.0        # 偏航角 Yaw（弧度）

  # 左臂的臂基座参数（如果有左臂相机）
  arm_base_offset_left:
    position:
      x: 0.1        # 末端执行器 X 坐标相对于基座（米）
      y: -0.1103    # 末端执行器 Y 坐标相对于基座（米）
      z: 0.031645   # 末端执行器 Z 坐标相对于基座（米）
    rotation_rpy:
      r: 0.0        # 滚动角 Roll（弧度）
      p: -0.7854    # 俯仰角 Pitch（弧度，约 -45° = -π/4）
      y: 3.1416     # 偏航角 Yaw（弧度，约 π）

  # =========================================================
  # ArUco 标记识别参数
  # =========================================================

  aruco:
    dict_type: "DICT_5X5_1000"
    marker_size: 0.030          # 标记物的实际尺寸（米），应与打印的标记一致
    target_ids:
      - 11
      - 12
      - 21

  # =========================================================
  # TF 坐标系名称定义（仅用于参考）
  # =========================================================

  tf_frames:
    base_frame: "platform_base_link"      # 基座链接（固定不动）
    right_arm_base: "r_base_link1"        # 右臂基座链接
    left_arm_base: "l_base_link1"         # 左臂基座链接
    camera_frame: "camera_color_frame"    # 相机坐标系
