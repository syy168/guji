# 系统全局参数配置
#
# 本文件包含机械臂运动、夹爪控制、视觉识别等各环节的全局参数。
# 所有数值均设定了安全范围，运行前请确认是否符合实际设备要求。
#
# 参数修改建议：
#   - 首次运行时使用默认值
#   - 确认安全后，根据实际效果逐步调整
#   - 调整速度参数时，建议从低值开始（如 speed=20）

system:

  # =========================================================
  # 机械臂运动参数
  # =========================================================
  arm:

    # 默认关节运动速度（1~100）
    # 数值越大运动越快，建议调试时用 20~30，正式运行时可用 50
    movej_default_speed: 30

    # 默认直线运动速度（1~100）
    movel_default_speed: 30

    # MoveJ 阻塞等待超时（秒）
    # 超过此时间机械臂仍未到达目标位置，视为超时
    movej_timeout: 30.0

    # MoveL 阻塞等待超时（秒）
    movel_timeout: 30.0

    # 状态更新等待超时（秒）
    # 用于等待关节状态数据首次到达
    joint_state_timeout: 10.0

  # =========================================================
  # 夹爪控制参数
  # =========================================================
  gripper:

    # 夹爪位置值范围：1~1000
    #   1    = 完全闭合（夹紧）
    #   500  = 半开
    #   1000 = 完全打开（约 70mm）
    position_open: 1000
    position_close: 0
    position_half: 500

    # 力控夹取速度（1~1000）
    # 数值越大夹爪开合越快
    pick_speed: 300

    # 力控夹取力阈值（1~1000）
    # 数值越大夹持力越大（最大约 1.5kg）
    pick_force: 300

    # 位置控制开口超时（毫秒）
    position_timeout_ms: 5000

  # =========================================================
  # 力位混合控制参数
  # =========================================================
  force_position:

    # 传感器类型：0=一维力, 1=六维力
    sensor_type: 0

    # 坐标系：0=基坐标系, 1=工具坐标系
    coordinate_mode: 1

    # 运动方向（0~5）：
    #   0 = X轴, 1 = Y轴, 2 = Z轴（垂直向下）
    #   3 = RX（绕X旋转）, 4 = RY, 5 = RZ
    direction: 2   # 默认 Z 轴方向（放料下压）

    # 力阈值（精度 0.1N）
    # 达到此力值时停止运动
    force_threshold: 10

    # 高跟随模式
    follow_mode: true

  # =========================================================
  # 视觉识别参数
  # =========================================================
  vision:

    # 单次识别超时（秒）
    # 超过此时间未检测到目标，Service 返回 found=False
    timeout: 5.0

    # 识别角度稳定性阈值（弧度）
    # 用于过滤检测抖动：
    #   当前帧角度与历史窗口最大偏差小于此值时，视为"稳定"
    # 典型值：0.05~0.2 rad（约 3°~12°）
    stability_threshold: 0.1

    # 历史窗口大小（帧数）
    # 用于角度平滑滑动窗口，越大越平滑但响应越慢
    history_size: 10

    # 平滑因子（0~1）
    # 0 = 完全相信当前帧，1 = 完全相信上一帧
    # 值越大运动越平滑但滞后越大
    smoothing_factor: 0.8

    # 深度平均窗口半径（像素）
    # 检测到标记后，取目标点周围 NxN 像素的深度值平均
    depth_averaging_radius: 3

  # =========================================================
  # ROS2 通信参数
  # =========================================================
  ros2:

    # 相机话题 QoS
    #   'BEST_EFFORT' = 尽量传输，不保证到达（适合图像流）
    #   'RELIABLE'    = 可靠传输，保证到达（适合指令）
    camera_qos: "BEST_EFFORT"

    # 机械臂指令话题 QoS
    arm_qos: "RELIABLE"

    # TF 变换超时（秒）
    tf_timeout: 1.0

    # Service 调用超时（秒）
    service_timeout: 5.0

  # =========================================================
  # 调试与日志参数
  # =========================================================
  debug:

    # 是否启用调试模式
    # 调试模式下会输出更多信息（TF 变换详情、图像帧率等）
    enabled: false

    # 相机诊断日志输出频率（秒）
    camera_diagnostic_interval: 5.0

    # 是否显示图像窗口（需连接显示器）
    # WARNING: 在无头服务器上请勿设为 true
    show_image: false

    # 图像显示窗口名称
    image_window: "Right Arm Camera"
